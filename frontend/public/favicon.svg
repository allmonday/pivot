<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1a1a2e"/>

  <!-- Connection lines (hub spokes) -->
  <line x1="16" y1="6" x2="16" y2="13" stroke="#863bff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="19" x2="16" y2="26" stroke="#863bff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="6" y1="16" x2="13" y2="16" stroke="#863bff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="19" y1="16" x2="26" y2="16" stroke="#863bff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center hub (pivot point) -->
  <circle cx="16" cy="16" r="4.5" fill="#863bff"/>

  <!-- Endpoint nodes -->
  <circle cx="16" cy="5" r="2.5" fill="#a855f7"/>
  <circle cx="16" cy="27" r="2.5" fill="#a855f7"/>
  <circle cx="5" cy="16" r="2.5" fill="#a855f7"/>
  <circle cx="27" cy="16" r="2.5" fill="#a855f7"/>

  <!-- Center highlight -->
  <circle cx="16" cy="16" r="2" fill="#c084fc"/>
</svg>
